<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Immortals — JARVIS bubble (concept demo)</title>
<style>
  :root{
    --bg:#0b0d12; --desk1:#0f1320; --desk2:#0b0d12;
    --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a; --line2:#39414f;
    --fg:#e9ecf2; --muted:#9aa3b2; --accent:#6ea8fe; --accent2:#8b7cff;
    --ok:#4ec9a8; --warn:#e0b341; --fail:#f06d6d; --chip:#283041;
    --glow:0 0 0 4px rgba(110,168,254,.18), 0 12px 40px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:radial-gradient(1200px 700px at 70% -10%, #18203a 0%, var(--desk1) 45%, var(--desk2) 100%);
    color:var(--fg); font:14px/1.55 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;
  }
  /* faux desktop: a blurred "your work" window behind, so the bubble floats over real work */
  .desk-window{
    position:fixed; left:6%; top:14%; width:62%; height:72%; border-radius:14px;
    background:linear-gradient(180deg,#12151d,#0e1118); border:1px solid #1b1f29;
    box-shadow:0 30px 80px rgba(0,0,0,.5); filter:blur(.3px); opacity:.62; overflow:hidden;
  }
  .dw-bar{height:34px;background:#161a23;border-bottom:1px solid #1b1f29;display:flex;align-items:center;gap:7px;padding:0 13px}
  .dot{width:11px;height:11px;border-radius:50%}
  .dw-body{padding:18px 20px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:#5b6577}
  .dw-body .l{height:9px;border-radius:5px;background:#1c212c;margin:9px 0}
  /* top chrome */
  .top{position:fixed;left:0;right:0;top:0;display:flex;align-items:center;gap:16px;padding:14px 22px;z-index:5}
  .brand{font-weight:700;letter-spacing:.3px}
  .brand .v{color:var(--muted);font-weight:400;font-size:12px;margin-left:8px}
  .tabs{display:flex;gap:6px;margin-left:18px}
  .tabs button{background:var(--chip);color:var(--fg);border:1px solid var(--line);border-radius:999px;
    padding:7px 16px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px}
  .tabs button.active{background:var(--accent);color:#06101f;border-color:var(--accent);font-weight:600}
  .top .right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .hint{color:var(--muted);font-size:12.5px;max-width:360px}
  .replay{background:transparent;color:var(--accent);border:1px solid var(--line2);border-radius:8px;
    padding:7px 14px;cursor:pointer;font-size:13px}
  .replay:hover{border-color:var(--accent)}
  .mocktag{position:fixed;left:22px;bottom:16px;color:#5b6577;font-size:11.5px;z-index:5}

  /* the floating bubble dock (bottom-right) */
  .dock{position:fixed;right:34px;bottom:34px;z-index:10;display:flex;flex-direction:column;
    align-items:flex-end;gap:14px;width:min(430px,42vw)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--glow);
    width:100%;opacity:0;transform:translateY(10px) scale(.98);transition:.34s cubic-bezier(.2,.8,.2,1);
    pointer-events:none;overflow:hidden}
  .card.show{opacity:1;transform:none;pointer-events:auto}
  .card .hd{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .card .hd .ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06101f;font-weight:800;font-size:14px}
  .card .hd .t{font-weight:600}
  .card .hd .s{color:var(--muted);font-size:12px;margin-left:auto}
  .card .bd{padding:14px 16px}
  .mut{color:var(--muted)}
  .small{font-size:12.5px}
  /* delegate speech */
  .say{background:var(--panel2);border:1px solid var(--line);border-radius:14px 14px 4px 14px;
    padding:11px 14px;align-self:flex-end;max-width:86%}
  .say .who{color:var(--muted);font-size:11px;margin-bottom:3px}
  /* specialist chips + mini dag */
  .team{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 10px}
  .agent{display:flex;align-items:center;gap:6px;background:var(--chip);border:1px solid var(--line);
    border-radius:999px;padding:5px 11px;font-size:12.5px}
  .agent .d{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  svg.mini{display:block;width:100%;max-width:172px;height:auto;margin:6px auto 2px}
  .mini .n rect{fill:var(--panel2);stroke:var(--line)}
  .mini .n .l{fill:var(--fg);font-size:11px;font-weight:600}
  .mini .n .a{fill:var(--muted);font-size:9.5px}
  /* working pill */
  .pill{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:999px;box-shadow:var(--glow);padding:11px 18px;opacity:0;transform:translateY(8px);
    transition:.3s;pointer-events:none}
  .pill.show{opacity:1;transform:none;pointer-events:auto}
  .spin{width:16px;height:16px;border-radius:50%;border:2px solid var(--line2);border-top-color:var(--accent);
    animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .pill .meta{font-size:12px;color:var(--muted)}
  .pill .meta b{color:var(--fg)}
  /* the orb */
  .orb{width:62px;height:62px;border-radius:50%;display:grid;place-items:center;cursor:pointer;
    background:radial-gradient(circle at 35% 30%, #9cc1ff 0%, var(--accent) 40%, var(--accent2) 100%);
    color:#06101f;font-size:24px;font-weight:800;box-shadow:var(--glow);animation:breathe 3.4s ease-in-out infinite}
  .orb.alert{animation:alert 1s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(110,168,254,.0),0 12px 40px rgba(0,0,0,.5)}
    50%{transform:scale(1.05);box-shadow:0 0 0 10px rgba(110,168,254,.10),0 12px 40px rgba(0,0,0,.5)}}
  @keyframes alert{0%,100%{box-shadow:0 0 0 0 rgba(224,179,65,.0),0 12px 40px rgba(0,0,0,.5)}
    50%{box-shadow:0 0 0 12px rgba(224,179,65,.22),0 12px 40px rgba(0,0,0,.5)}}
  /* ping */
  .ping{border-color:var(--warn)}
  .ping .hd{border-color:rgba(224,179,65,.3)}
  .ping .hd .ic{background:linear-gradient(135deg,var(--warn),#d98b3a);color:#1a1205}
  .why{background:rgba(224,179,65,.08);border:1px solid rgba(224,179,65,.25);border-radius:10px;
    padding:10px 12px;margin:4px 0 12px}
  .why .k{color:var(--warn);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--fg);
    border-radius:10px;padding:10px 13px;cursor:pointer;transition:.12s;font-size:13px}
  .opt:hover{border-color:var(--accent);background:#222838}
  .heldback{margin-top:11px;color:var(--muted);font-size:11.5px;display:flex;align-items:center;gap:6px}
  /* report */
  .rep .hd .ic{background:linear-gradient(135deg,var(--ok),#39b894);color:#04140e}
  .rep .bd{max-height:min(64vh,560px);overflow:auto}
  .sec{margin:14px 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .deliv{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--line)}
  .deliv .f{color:var(--accent)}
  .prov{display:flex;gap:9px;padding:7px 0;font-size:12.5px;border-bottom:1px solid var(--line)}
  .prov .ag{color:var(--accent);font-weight:600;white-space:nowrap}
  .verify{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .vchip{background:rgba(78,201,168,.12);color:var(--ok);border:1px solid rgba(78,201,168,.3);
    border-radius:999px;padding:4px 11px;font-size:12px}
  .repfoot{display:flex;gap:9px;margin-top:14px}
  .btn{flex:1;text-align:center;border-radius:9px;padding:9px;cursor:pointer;font-size:13px;font-weight:600}
  .btn.primary{background:var(--accent);color:#06101f;border:none}
  .btn.ghost{background:transparent;color:var(--fg);border:1px solid var(--line2)}
  .toast{font-size:12px;color:var(--muted);align-self:center}
  .fade-in{animation:fin .4s ease}
  @keyframes fin{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
</style>
</head>
<body>
  <!-- faux desktop background: your real work, blurred behind -->
  <div class="desk-window" aria-hidden="true">
    <div class="dw-bar"><span class="dot" style="background:#f0625d"></span>
      <span class="dot" style="background:#f5bf4f"></span>
      <span class="dot" style="background:#5bc26a"></span>
      <span style="margin-left:10px;color:#5b6577;font-size:12px" id="deskTitle">your-work — main.py</span></div>
    <div class="dw-body" id="deskBody"></div>
  </div>

  <div class="top">
    <span class="brand">⚔ Immortals</span>
    <div class="tabs" id="tabs"></div>
    <div class="right">
      <span class="hint" id="hint"></span>
      <button class="replay" onclick="play()">↻ Replay</button>
    </div>
  </div>

  <div class="dock" id="dock"></div>

  <div class="mocktag">Concept mockup — scripted, not wired to a live backend. Demonstrates the intended experience.</div>

<script>
const esc = s => String(s ?? "").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ----- scenarios: each showcases Immortals' real strengths -------------------------------
   strengths surfaced: (1) a routed multi-agent SPECIALIST team + a deterministic DAG plan,
   (2) silence-by-default with an explicit "held back N routine decisions" anti-spam proof,
   (3) ONE genuinely interrupt-worthy check-in (a judgment fork it must not decide for you),
   (4) a tangible, PROVENANCE-stamped, self-VERIFIED deliverable.                          */
const SCENARIOS = {
  pm: {
    label:"PM", icon:"◑",
    desk:["product-feedback.csv — 1,240 rows","telemetry/q2-dashboards","Q3-planning-review.docx"],
    deskTitle:"Q3-planning — feedback.csv",
    task:"Turn last quarter's customer feedback + telemetry into a prioritized feature brief for the Q3 planning review.",
    team:[["researchAS","mines feedback + telemetry"],["discussAS","pressure-tests priorities"],
          ["experimentAS","sizes impact w/ CIs"],["presentAS","drafts the brief"]],
    dag:["research","prioritize","size","brief"],
    elapsed:"31 min", held:"7 routine choices (tag de-dup, chart styles, section order)",
    ping:{
      title:"Priority conflict — your call",
      why:"The #1 customer ask (faster sync) directly trades off against the reliability OKR your VP set. That's an intent call I shouldn't make for you.",
      opts:["Optimize the brief for the customer ask","Optimize for the reliability OKR","Frame both as a tradeoff for the review"]},
    report:{
      title:"Q3 Feature Brief — ready",
      blurb:"A decision-ready brief, framed as a tradeoff per your pick.",
      deliv:["8-page prioritized brief (PPTX + doc)","Top-12 features ranked by impact × effort","1-slide VP tradeoff: sync speed vs reliability"],
      prov:[["researchAS","analyzed 1,240 feedback items + 3 telemetry dashboards — every figure cited"],
            ["discussAS","flagged 2 over-weighted asks; corrected the ranking"],
            ["experimentAS","sized impact with 95% CIs, not point guesses"],
            ["presentAS","built the deck with sourced speaker notes"]],
      verify:["Every number traces to a source","No fabricated stats","Tradeoff is honest"]}
  },
  ds: {
    label:"Applied / DS", icon:"∿",
    desk:["eval/offline_suite.py","models/ranker_v7.ckpt","scorecards/control_vs_exp"],
    deskTitle:"eval — offline_suite.py",
    task:"Evaluate the new ranking model — control vs experiment on the offline suite, summarize the scorecard, and flag any regressions.",
    team:[["experimentAS","pre-registers metric + guardrails"],["coderAS","runs the offline jobs"],
          ["discussAS","SRM + sanity checks"],["paperAS","writes the readout"]],
    dag:["design","run","check","readout"],
    elapsed:"47 min", held:"9 routine steps (seed selection, metric formatting, plot styling)",
    ping:{
      title:"Stat-sig regression — decision needed",
      why:"Experiment improves NDCG@10 by +1.4% overall, but regresses mobile / low-bandwidth by −2.1% (p<0.01). The full run costs ~6 GPU-hrs — I paused rather than spend it on a guess.",
      opts:["Run the full eval anyway","Investigate the mobile segment first","Stop — not worth the regression"]},
    report:{
      title:"Offline eval — complete",
      blurb:"Scorecard + the segment dig you asked for, with a ship/no-ship call.",
      deliv:["Scorecard: control vs experiment across 14 metrics","Mobile-segment regression analysis","Ship / no-ship recommendation with caveats"],
      prov:[["experimentAS","pre-registered the metric + guardrails before seeing data"],
            ["coderAS","ran 12 offline jobs — every one in the event log"],
            ["discussAS","ran the SRM check + multiplicity correction"],
            ["paperAS","wrote the readout — effect sizes + CIs, not bare p-values"]],
      verify:["95% CIs, not bare p-values","SRM passed","Reproducible from the event log"]}
  },
  swe: {
    label:"SWE", icon:"⌘",
    desk:["bugs/inbox — 38 new","services/auth/redirect.ts","repro/cluster-2.test.ts"],
    deskTitle:"triage — bugs/inbox",
    task:"Triage the 38 new customer-reported bugs, cluster them, and root-cause the top issue.",
    team:[["coderAS","clusters + reproduces"],["discussAS","red-teams the root cause"],
          ["coderAS","drafts the fix + tests"],["researchAS","checks related reports"]],
    dag:["cluster","repro","root-cause","fix"],
    elapsed:"52 min", held:"11 routine steps (de-dup, label mapping, stack-trace parsing)",
    ping:{
      title:"Possible security issue — escalate now?",
      why:"Cluster #2 (6 reports) root-causes to an auth-token check skipped on a redirect path — it looks like an auth bypass. An MSRC escalation is a judgment + ownership call, so it's yours, not mine.",
      opts:["Escalate to MSRC now","Confirm the repro first, then escalate","Not a security issue — keep triaging"]},
    report:{
      title:"Triage — done",
      blurb:"38 bugs clustered, top issues root-caused, a fix PR ready for #1.",
      deliv:["38 bugs → 9 root-cause clusters","Top-3 RCAs, each with a runnable repro","Draft fix PR for cluster #1 — tests passing"],
      prov:[["coderAS","reproduced the top 3 — build + test logs attached"],
            ["discussAS","red-teamed and caught the auth-bypass in cluster #2"],
            ["coderAS","fix PR is type-clean, 14/14 tests green"],
            ["researchAS","linked 2 older reports to the same root cause"]],
      verify:["Every RCA has a runnable repro","Fix PR self-verifies (tests green)","Type-clean"]}
  }
};

let current = "pm", timers = [], pingResolved = false;
const dock = document.getElementById("dock");
const after = (ms,fn)=>{ const t=setTimeout(fn,ms); timers.push(t); return t; };
const clearTimers = ()=>{ timers.forEach(clearTimeout); timers=[]; };

/* tabs */
const tabs = document.getElementById("tabs");
tabs.innerHTML = Object.entries(SCENARIOS).map(([k,s])=>
  `<button id="tab-${k}" onclick="switchTo('${k}')"><span>${s.icon}</span>${esc(s.label)}</button>`).join("");
function setActiveTab(){ Object.keys(SCENARIOS).forEach(k=>
  document.getElementById("tab-"+k).classList.toggle("active",k===current)); }
function switchTo(k){ current=k; setActiveTab(); play(); }

/* desktop backdrop reflects the persona's "real work" */
function paintDesk(){
  const s=SCENARIOS[current];
  document.getElementById("deskTitle").textContent=s.deskTitle;
  document.getElementById("deskBody").innerHTML =
    s.desk.map(l=>`<div>${esc(l)}</div>`).join("") +
    Array.from({length:7}).map((_,i)=>`<div class="l" style="width:${90-i*7}%"></div>`).join("");
}

/* mini DAG (reuses the dashboard's layered top→down style, simplified to a chain) */
function miniDag(nodes,team){
  const NW=92,NH=34,VGAP=20,PAD=8,W=NW+PAD*2,H=nodes.length*(NH+VGAP)-VGAP+PAD*2;
  let edges="",els="";
  nodes.forEach((n,i)=>{
    const x=PAD,y=PAD+i*(NH+VGAP);
    if(i>0){const py=y-VGAP;edges+=`<path d="M${x+NW/2},${py} L${x+NW/2},${y}" stroke="var(--line2)" marker-end="url(#a2)"/>`;}
    els+=`<g class="n" transform="translate(${x},${y})"><rect width="${NW}" height="${NH}" rx="7"/>
      <text class="l" x="9" y="15">${esc(n)}</text><text class="a" x="9" y="27">${esc((team[i]||[])[0]||"")}</text></g>`;
  });
  return `<svg class="mini" viewBox="0 0 ${W} ${H}"><defs><marker id="a2" viewBox="0 0 10 10" refX="9" refY="5"
    markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--line2)"/></marker></defs>
    ${edges}${els}</svg>`;
}

function card(cls,html){ const d=document.createElement("div"); d.className="card "+cls; d.innerHTML=html;
  dock.appendChild(d); requestAnimationFrame(()=>d.classList.add("show")); return d; }
function pill(html){ const d=document.createElement("div"); d.className="pill"; d.innerHTML=html;
  dock.appendChild(d); requestAnimationFrame(()=>d.classList.add("show")); return d; }
function orb(alert){ const d=document.createElement("div"); d.className="orb"+(alert?" alert":"");
  d.textContent="⚔"; d.title="Immortals"; dock.appendChild(d); return d; }
function clearDock(){ dock.innerHTML=""; }

/* the scripted loop */
function play(){
  clearTimers(); pingResolved=false; clearDock(); paintDesk(); setActiveTab();
  const s=SCENARIOS[current];
  document.getElementById("hint").innerHTML =
    "Watch: it works <b>silently</b>, then pings <b>once</b> — only for a call it can't make for you.";

  // 1) idle orb
  const o=orb(false);
  // 2) delegate
  after(1600,()=>{ clearDock();
    card("",`<div class="bd"><div class="say"><div class="who">You → Immortals</div>${esc(s.task)}</div></div>`);
    orb(false);
  });
  // 3) plan / team assembles
  after(5000,()=>{ clearDock();
    card("",`<div class="hd"><span class="ic">⚔</span><span class="t">Your team is on it</span>
        <span class="s">plan formed</span></div>
      <div class="bd"><div class="mut small" style="margin-bottom:8px">Routed to ${s.team.length} specialists — a deterministic plan, not one chatbot:</div>
        <div class="team">${s.team.map(t=>`<span class="agent"><span class="d"></span>${esc(t[0])}
          <span class="mut">· ${esc(t[1])}</span></span>`).join("")}</div>
        ${miniDag(s.dag,s.team)}</div>`);
    orb(false);
  });
  // 4) working silently
  after(8800,()=>{ clearDock();
    const p=pill(`<div class="spin"></div><div><div style="font-weight:600">Working — I won't interrupt unless I truly need you</div>
      <div class="meta"><b id="elapsed">00 min</b> elapsed · <b id="held">0</b> routine decisions handled</div></div>`);
    orb(false);
    // animate elapsed + held counters
    const target=parseInt(s.elapsed), heldN=parseInt(s.held);
    let e=0,h=0; const tick=after(0,function go(){
      e=Math.min(target,e+Math.ceil(target/22)); h=Math.min(heldN,h+1);
      const el=document.getElementById("elapsed"), hd=document.getElementById("held");
      if(el) el.textContent=String(e).padStart(2,"0")+" min";
      if(hd) hd.textContent=h;
      if(e<target||h<heldN) after(170,go);
    });
  });
  // 5) the ONE ping
  after(14500,()=>{ clearDock();
    card("ping",`<div class="hd"><span class="ic">!</span><span class="t">${esc(s.ping.title)}</span>
        <span class="s">needs you</span></div>
      <div class="bd">
        <div class="why"><div class="k">why I'm asking</div>${esc(s.ping.why)}</div>
        <div class="opts">${s.ping.opts.map((o,i)=>
          `<button class="opt" onclick="resolvePing(${i})">${esc(o)}</button>`).join("")}</div>
        <div class="heldback">🔕 I held back <b>&nbsp;${esc(s.held)}</b>&nbsp; — this is the only thing I needed you for.</div>
      </div>`);
    orb(true);
    // hands-off fallback: auto-pick the middle option if left alone (long, so it's readable)
    after(14000,()=>{ if(!pingResolved) resolvePing(Math.min(1,s.ping.opts.length-1)); });
  });
}

function resolvePing(i){
  if(pingResolved) return; pingResolved=true; clearTimers();
  const s=SCENARIOS[current];
  clearDock();
  card("",`<div class="bd"><div class="say"><div class="who">You → Immortals</div>${esc(s.ping.opts[i])}</div></div>`);
  orb(false);
  after(2400,()=>{ clearDock();
    pill(`<div class="spin"></div><div><div style="font-weight:600">Got it — finishing up</div>
      <div class="meta">applying your call · wrapping the deliverable</div></div>`); orb(false); });
  after(6000,()=>{ clearDock(); showReport(); });
}

function showReport(){
  const s=SCENARIOS[current], r=s.report;
  card("rep",`<div class="hd"><span class="ic">✓</span><span class="t">${esc(r.title)}</span>
      <span class="s">done · ${esc(s.elapsed)}</span></div>
    <div class="bd">
      <div class="small mut">${esc(r.blurb)}</div>
      <div class="sec">Deliverables</div>
      ${r.deliv.map(d=>`<div class="deliv"><span class="f">▣</span><span>${esc(d)}</span></div>`).join("")}
      <div class="sec">Who did what — full provenance</div>
      ${r.prov.map(p=>`<div class="prov"><span class="ag">${esc(p[0])}</span><span class="mut">${esc(p[1])}</span></div>`).join("")}
      <div class="sec">Verified</div>
      <div class="verify">${r.verify.map(v=>`<span class="vchip">✓ ${esc(v)}</span>`).join("")}</div>
      <div class="repfoot">
        <div class="btn primary" onclick="play()">Open deliverable</div>
        <div class="btn ghost" onclick="play()">↻ Replay</div>
      </div>
      <div class="toast" style="margin-top:10px">Every step above is auditable — reconstructable from the event log.</div>
    </div>`);
  orb(false);
}

play();
</script>
</body>
</html>
